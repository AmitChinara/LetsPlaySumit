<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Math Learning Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="app">

        <!-- QUESTION -->
        <div id="questionBox" class="question-box"></div>

        <!-- MAIN -->
        <div class="main">

            <!-- LEFT -->
            <div class="panel left">
                <h3>🧠 Your Solution</h3>
                <div id="answerBox"></div>
            </div>

            <!-- RIGHT -->
            <div class="panel right">

                <div class="hint-box">
                    <h3>💡 Hint</h3>
                    <p id="hintBox"></p>
                </div>

                <div id="dropZone" class="drop-zone">DROP HERE</div>

                <h3>🎯 Options</h3>
                <div id="optionsBox"></div>

                <button id="nextBtn" class="next-btn" disabled>
                    Next Question →
                </button>

            </div>

        </div>

    </div>

    <script src="js/data.js"></script>
    <script src="js/script.js"></script>

</body>

</html>
