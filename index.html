<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Quiz</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="main-container">

  <!-- Quiz -->
  <div class="quiz-container">
    <h2>Let's Play Sumit</h2>

    <div class="progress-bar">
      <div class="progress" id="progress"></div>
    </div>

    <img id="questionImage" src="" alt="Question Image">

    <!-- Input instead of options -->
    <input type="text" id="userInput" placeholder="Type your answer..." />
    <button id="submitBtn">Submit</button>

    <div id="answerFeedback" class="feedback"></div>

    <div class="score">Score: <span id="score">0</span></div>
  </div>

  <!-- Answer Board -->
  <div class="board">
    <h3>Answer Board</h3>
    <ul id="answerBoard"></ul>
  </div>

</div>

<script src="js/script.js"></script>
</body>
</html>
