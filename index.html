<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Math Learning Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="app">

    <div id="questionBox" class="question-box"></div>

    <div class="main">

        <div class="panel left">
            <h3>🧠 Your Solution</h3>
            <div id="answerBox"></div>
        </div>

        <div class="panel right">

            <div class="hint-box">
                <h3>💡 Step</h3>
                <p id="hintBox"></p>
            </div>

            <div class="input-box">
                <input id="inputField" type="text" placeholder="Type your answer..." />
                <button id="submitBtn">Submit</button>
            </div>

            <button id="nextBtn" class="next-btn" disabled>
                Next Question →
            </button>

        </div>

    </div>

</div>

<script src="js/data.js"></script>
<script src="js/script.js"></script>

</body>
</html>
