<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Riddle Drag & Drop</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>

    <div class="container">
      <h2>Riddle Game</h2>
      <div id="riddleBox"></div>

      <div class="drop-zone" id="dropZone">Drop Answer Here</div>

      <div class="options" id="options"></div>

      <p>Score: <span id="score">0</span></p>

      <h3>Answers</h3>
      <table border="1" width="100%" id="resultTable">
        <tr>
          <th>Question</th>
          <th>Your Answer</th>
          <th>Correct Answer</th>
        </tr>
      </table>
    </div>

    <script src="js/script.js"></script>
  </body>
</html>
